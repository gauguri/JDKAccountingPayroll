services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jdkbooks}
      POSTGRES_USER: ${POSTGRES_USER:-jdkbooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      # Host 5433 -> container 5432 (5432 is used by another local project).
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jdkbooks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    # --reload picks up backend code edits (./backend is mounted below).
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Host 8002 -> container 8000 (8000 is used by another local project).
      - "8002:8000"
    volumes:
      - ./backend:/app
      - doc_store:/data/documents

  worker:
    build: ./backend
    command: python -m app.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - doc_store:/data/documents

  web:
    build: ./frontend
    depends_on:
      - api
    environment:
      VITE_API_TARGET: http://api:8000
    volumes:
      # Live-reload: edits to ./frontend show up without rebuilding.
      # The anonymous volume keeps the container's node_modules intact.
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"

volumes:
  db_data:
  doc_store:
