services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jdkbooks}
      POSTGRES_USER: ${POSTGRES_USER:-jdkbooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jdkbooks}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./backend
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - doc_store:/data/documents

  worker:
    build: ./backend
    command: python -m app.worker
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - doc_store:/data/documents

  web:
    build: ./frontend
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  db_data:
  doc_store:
